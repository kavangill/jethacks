<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Halo Trail</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const { ipcRenderer } = require('electron');

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function sizeCanvas() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    sizeCanvas();
    window.addEventListener('resize', sizeCanvas);

    const COLORS = { ai: '#378ADD', user: '#FFB340' };
    const LIFE_MS = 1300; // how long a trail segment glows before fading out

    // AI annotation palette (draw_* tools) — persistent until cleared.
    const SHAPE_COLORS = { red: '#FF453A', blue: '#0A84FF', yellow: '#FFD60A' };
    const SHAPE_IN_MS = 260; // quick fade/scale-in so drawings feel drawn, not popped

    let color = COLORS.ai;
    let pts = []; // { x, y, t }
    let shapes = []; // { type, color, ...coords, t } — persistent annotations

    ipcRenderer.on('trail-mode', (_e, mode) => {
      color = COLORS[mode] || COLORS.ai;
      pts = [];
    });

    ipcRenderer.on('trail-point', (_e, x, y) => {
      const last = pts[pts.length - 1];
      // Skip duplicate points so a resting cursor doesn't build a blob.
      if (last && Math.abs(last.x - x) < 1 && Math.abs(last.y - y) < 1) return;
      pts.push({ x, y, t: performance.now() });
      if (pts.length > 600) pts.shift();
    });

    // trail-clear resets the whole overlay (new session); draw-clear only
    // erases the AI's annotations (the model's clear_drawings tool).
    ipcRenderer.on('trail-clear', () => { pts = []; shapes = []; });
    ipcRenderer.on('draw-shape', (_e, s) => { shapes.push({ ...s, t: performance.now() }); });
    ipcRenderer.on('draw-clear', () => { shapes = []; });

    function drawShape(s, now) {
      const c = SHAPE_COLORS[s.color] || SHAPE_COLORS.blue;
      const ease = Math.min(1, (now - s.t) / SHAPE_IN_MS);
      ctx.globalAlpha = 0.95 * ease;
      ctx.strokeStyle = c;
      ctx.shadowColor = c;
      ctx.shadowBlur = 14;
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      if (s.type === 'ellipse') {
        ctx.ellipse(s.cx, s.cy, Math.max(1, s.rx), Math.max(1, s.ry), 0, 0, Math.PI * 2);
      } else if (s.type === 'rect') {
        ctx.rect(s.x, s.y, s.w, s.h);
      } else if (s.type === 'line' || s.type === 'arrow') {
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
      }
      ctx.stroke();
      if (s.type === 'arrow') {
        // Arrowhead: two short strokes swept back from the tip.
        const ang = Math.atan2(s.y2 - s.y1, s.x2 - s.x1);
        const len = 16;
        ctx.beginPath();
        ctx.moveTo(s.x2, s.y2);
        ctx.lineTo(s.x2 - len * Math.cos(ang - 0.45), s.y2 - len * Math.sin(ang - 0.45));
        ctx.moveTo(s.x2, s.y2);
        ctx.lineTo(s.x2 - len * Math.cos(ang + 0.45), s.y2 - len * Math.sin(ang + 0.45));
        ctx.stroke();
      }
    }

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function frame() {
      const now = performance.now();
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (const s of shapes) drawShape(s, now);
      pts = pts.filter((p) => now - p.t < LIFE_MS);
      for (let i = 1; i < pts.length; i++) {
        const a = pts[i], b = pts[i - 1];
        // Break the stroke across big jumps (cursor teleports, mode changes).
        if (Math.hypot(a.x - b.x, a.y - b.y) > 200) continue;
        const age = (now - a.t) / LIFE_MS; // 0 fresh → 1 gone
        ctx.globalAlpha = (1 - age) * 0.9;
        ctx.strokeStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 16 * (1 - age) + 4;
        ctx.lineWidth = 5 * (1 - age) + 1.5;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(a.x, a.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ---- screenshot annotation service ----------------------------------
    // Main sends the screenshot + the user's gesture path (already scaled to
    // image space); we composite the path onto the image and send it back so
    // Claude can see exactly what the student circled.
    ipcRenderer.on('annotate', (_e, base64, points) => {
      const img = new Image();
      img.onload = () => {
        const off = document.createElement('canvas');
        off.width = img.width;
        off.height = img.height;
        const octx = off.getContext('2d');
        octx.drawImage(img, 0, 0);
        if (points.length > 1) {
          octx.lineCap = 'round';
          octx.lineJoin = 'round';
          octx.strokeStyle = '#FF9F0A';
          octx.shadowColor = '#FF9F0A';
          octx.shadowBlur = Math.max(6, img.width * 0.006);
          octx.lineWidth = Math.max(3, img.width * 0.0035);
          octx.beginPath();
          octx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) octx.lineTo(points[i].x, points[i].y);
          octx.stroke();
        }
        ipcRenderer.send('annotate-done', off.toDataURL('image/png').split(',')[1]);
      };
      img.onerror = () => ipcRenderer.send('annotate-done', base64);
      img.src = 'data:image/png;base64,' + base64;
    });
  </script>
</body>
</html>
