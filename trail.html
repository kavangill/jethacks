<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Halo Trail</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const { ipcRenderer } = require('electron');

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function sizeCanvas() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    sizeCanvas();
    window.addEventListener('resize', sizeCanvas);

    const COLORS = { ai: '#378ADD', user: '#FFB340' };
    const LIFE_MS = 1300; // how long a trail segment glows before fading out

    // AI annotation palette (draw_* tools) — persistent until cleared.
    const SHAPE_COLORS = { red: '#FF453A', blue: '#0A84FF', yellow: '#FFD60A' };
    // Draw-on times: each shape animates like a hand sketching it — circles
    // sweep around, arrows grow start-to-tip, rects trace their perimeter.
    const DRAW_MS = { ellipse: 600, rect: 550, line: 450, arrow: 500, text: 300 };

    let color = COLORS.ai;
    let pts = []; // { x, y, t }
    let shapes = []; // { type, color, ...coords, t } — persistent annotations

    ipcRenderer.on('trail-mode', (_e, mode) => {
      color = COLORS[mode] || COLORS.ai;
      pts = [];
    });

    ipcRenderer.on('trail-point', (_e, x, y) => {
      const last = pts[pts.length - 1];
      // Skip duplicate points so a resting cursor doesn't build a blob.
      if (last && Math.abs(last.x - x) < 1 && Math.abs(last.y - y) < 1) return;
      pts.push({ x, y, t: performance.now() });
      if (pts.length > 600) pts.shift();
    });

    // trail-clear resets the whole overlay (new session); draw-clear only
    // erases the AI's annotations (the model's clear_drawings tool).
    ipcRenderer.on('trail-clear', () => { pts = []; shapes = []; });
    // debug-only: opaque backdrop so calibration captures are noise-free
    ipcRenderer.on('trail-bg', (_e, color) => { document.body.style.background = color; });
    ipcRenderer.on('draw-shape', (_e, s) => { shapes.push({ ...s, t: performance.now() }); });
    ipcRenderer.on('draw-clear', () => { shapes = []; });

    // Paint one shape onto any 2d context at draw-on progress e (0..1, eased).
    // Shared by the live overlay and the screenshot compositor (e = 1 there).
    // Marker look: shapes and plain lines are thick; arrows and text run
    // thinner so labels and pointers stay crisp and readable.
    function paintShape(g, s, e) {
      const c = SHAPE_COLORS[s.color] || SHAPE_COLORS.blue;
      g.strokeStyle = c;
      g.fillStyle = c;
      g.lineCap = 'round';
      g.lineJoin = 'round';
      if (s.type === 'text') {
        g.globalAlpha = e;
        const pop = 0.85 + 0.15 * e; // slight settle-in
        g.font = `600 ${s.size * pop}px "Marker Felt", "Chalkboard SE", sans-serif`;
        g.textAlign = 'center';
        g.textBaseline = 'middle';
        g.fillText(s.text, s.x, s.y);
        g.globalAlpha = 1;
        return;
      }
      if (s.type === 'ellipse') {
        g.lineWidth = 7;
        g.beginPath();
        // Sweep around from the top, like a pen circling the target.
        const start = -Math.PI / 2;
        g.ellipse(s.cx, s.cy, Math.max(1, s.rx), Math.max(1, s.ry), 0, start, start + e * Math.PI * 2);
        g.stroke();
      } else if (s.type === 'rect') {
        g.lineWidth = 7;
        // Trace the perimeter clockwise from the top-left corner.
        const pts = [
          [s.x, s.y], [s.x + s.w, s.y], [s.x + s.w, s.y + s.h], [s.x, s.y + s.h], [s.x, s.y],
        ];
        let remain = e * 2 * (Math.abs(s.w) + Math.abs(s.h));
        g.beginPath();
        g.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length && remain > 0; i++) {
          const dx = pts[i][0] - pts[i - 1][0];
          const dy = pts[i][1] - pts[i - 1][1];
          const seg = Math.abs(dx) + Math.abs(dy);
          if (remain >= seg) {
            g.lineTo(pts[i][0], pts[i][1]);
            remain -= seg;
          } else {
            g.lineTo(pts[i - 1][0] + (dx * remain) / seg, pts[i - 1][1] + (dy * remain) / seg);
            remain = 0;
          }
        }
        g.stroke();
      } else if (s.type === 'line') {
        g.lineWidth = 7;
        g.beginPath();
        g.moveTo(s.x1, s.y1);
        g.lineTo(s.x1 + (s.x2 - s.x1) * e, s.y1 + (s.y2 - s.y1) * e);
        g.stroke();
      } else if (s.type === 'arrow') {
        g.lineWidth = 3.5;
        // The shaft grows toward the target with the head riding the tip.
        const tx = s.x1 + (s.x2 - s.x1) * e;
        const ty = s.y1 + (s.y2 - s.y1) * e;
        g.beginPath();
        g.moveTo(s.x1, s.y1);
        g.lineTo(tx, ty);
        const ang = Math.atan2(s.y2 - s.y1, s.x2 - s.x1);
        const len = 13;
        g.moveTo(tx, ty);
        g.lineTo(tx - len * Math.cos(ang - 0.45), ty - len * Math.sin(ang - 0.45));
        g.moveTo(tx, ty);
        g.lineTo(tx - len * Math.cos(ang + 0.45), ty - len * Math.sin(ang + 0.45));
        g.stroke();
      }
    }

    function drawShape(s, now) {
      const dur = DRAW_MS[s.type] || 500;
      const p = Math.min(1, (now - s.t) / dur);
      const e = 1 - Math.pow(1 - p, 3); // ease-out: fast start, gentle finish
      ctx.shadowColor = SHAPE_COLORS[s.color] || SHAPE_COLORS.blue;
      ctx.shadowBlur = s.type === 'text' ? 2 : 4;
      paintShape(ctx, s, e);
      ctx.shadowBlur = 0;
    }

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function frame() {
      const now = performance.now();
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (const s of shapes) drawShape(s, now);
      pts = pts.filter((p) => now - p.t < LIFE_MS);
      for (let i = 1; i < pts.length; i++) {
        const a = pts[i], b = pts[i - 1];
        // Break the stroke across big jumps (cursor teleports, mode changes).
        if (Math.hypot(a.x - b.x, a.y - b.y) > 200) continue;
        const age = (now - a.t) / LIFE_MS; // 0 fresh → 1 gone
        ctx.globalAlpha = (1 - age) * 0.9;
        ctx.strokeStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 16 * (1 - age) + 4;
        ctx.lineWidth = 5 * (1 - age) + 1.5;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(a.x, a.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ---- screenshot annotation service ----------------------------------
    // Main sends the screenshot + the user's gesture path (already scaled to
    // image space); we composite the path onto the image and send it back so
    // Claude can see exactly what the student circled.
    ipcRenderer.on('annotate', (_e, base64, points) => {
      const img = new Image();
      img.onload = () => {
        const off = document.createElement('canvas');
        off.width = img.width;
        off.height = img.height;
        const octx = off.getContext('2d');
        octx.drawImage(img, 0, 0);
        if (points.length > 1) {
          octx.lineCap = 'round';
          octx.lineJoin = 'round';
          octx.strokeStyle = '#FF9F0A';
          octx.shadowColor = '#FF9F0A';
          octx.shadowBlur = Math.max(6, img.width * 0.006);
          octx.lineWidth = Math.max(3, img.width * 0.0035);
          octx.beginPath();
          octx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) octx.lineTo(points[i].x, points[i].y);
          octx.stroke();
        }
        ipcRenderer.send('annotate-done', off.toDataURL('image/png').split(',')[1]);
      };
      img.onerror = () => ipcRenderer.send('annotate-done', base64);
      img.src = 'data:image/png;base64,' + base64;
    });

    // ---- drawing compositor ----------------------------------------------
    // Replays the current shape list onto a screenshot so Claude can see
    // where its own marks landed (the live overlay is capture-protected).
    // Shapes are in window coords; image = (window + origin) * k.
    ipcRenderer.on('annotate-shapes', (_e, base64, { k, ox, oy }) => {
      const img = new Image();
      img.onload = () => {
        const off = document.createElement('canvas');
        off.width = img.width;
        off.height = img.height;
        const octx = off.getContext('2d');
        octx.drawImage(img, 0, 0);
        octx.setTransform(k, 0, 0, k, ox * k, oy * k);
        for (const s of shapes) paintShape(octx, s, 1);
        octx.setTransform(1, 0, 0, 1, 0, 0);
        ipcRenderer.send('annotate-shapes-done', off.toDataURL('image/png').split(',')[1]);
      };
      img.onerror = () => ipcRenderer.send('annotate-shapes-done', base64);
      img.src = 'data:image/png;base64,' + base64;
    });
  </script>
</body>
</html>
