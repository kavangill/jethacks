<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <link rel="stylesheet" href="node_modules/katex/dist/katex.min.css" />
  <style>
    :root {
      --island-bg: rgb(33, 33, 38);
      --island-border: rgba(255, 255, 255, 0.10);
      --text: rgba(255, 255, 255, 0.85);
      --muted: rgba(255, 255, 255, 0.55);
      --head: #ffffff;
      --accent: rgba(255, 255, 255, 0.55);
      --teal: #40c8e0;
      --red: #ff453a;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      height: 100%;
    }

    #root {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      box-sizing: border-box;
    }

    .island {
      background: var(--island-bg);
      border: 1px solid var(--island-border);
      border-radius: 11px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    #panel {
      height: 0;
      margin-bottom: 0;
      opacity: 0;
      overflow: hidden;
      transition: height 0.16s ease-out, opacity 0.16s ease-out, margin-bottom 0.16s ease-out;
      box-sizing: border-box;
    }
    #panel.open {
      opacity: 1;
      margin-bottom: 6px;
    }
    #scroll {
      height: 100%;
      overflow-y: auto;
      padding: 6px 10px;
      box-sizing: border-box;
    }
    #scroll::-webkit-scrollbar { width: 6px; }
    #scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    #content {
      font-family: var(--mono);
      font-size: 11.5px;
      line-height: 1.75;
      color: var(--text);
      word-wrap: break-word;
    }
    #content .h1 { font-size: 15px;   font-weight: 700; color: var(--head); margin-top: 14px; margin-bottom: 6px; }
    #content .h2 { font-size: 13.5px; font-weight: 700; color: var(--head); margin-top: 14px; margin-bottom: 6px; }
    #content .h3 { font-size: 12.5px; font-weight: 700; color: var(--head); margin-top: 14px; margin-bottom: 6px; }
    #content .line { margin-bottom: 6px; white-space: pre-wrap; }
    #content .muted { color: var(--muted); }
    #content .prompt { color: var(--teal); font-weight: 600; margin-top: 12px; margin-bottom: 8px; }
    #content .error { color: var(--red); }
    #content .marker { color: var(--accent); }
    #content .hr {
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      margin: 10px 0;
    }
    #content code {
      font-family: var(--mono);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      padding: 0 3px;
    }
    #content b { color: var(--head); }

    #content .shot {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      margin: 6px 0;
    }
    #content .thinking {
      color: var(--muted);
      font-style: italic;
      border-left: 2px solid rgba(255, 179, 64, 0.5);
      padding-left: 8px;
      margin-bottom: 6px;
      white-space: pre-wrap;
    }

    #bar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 42px;
      flex-shrink: 0;
      box-sizing: border-box;
      padding: 0 8px;
    }

    input {
      -webkit-app-region: no-drag;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
    }
    input::placeholder { color: var(--muted); }
    input:disabled { color: var(--muted); }

    #kill {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      padding: 0 4px;
      cursor: pointer;
      color: var(--red);
      font-size: 20px;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1;
    }
    #kill:hover { opacity: 0.75; }

    #mic {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    #mic svg { pointer-events: none; display: block; }
    #mic:hover { color: var(--text); border-color: rgba(255, 255, 255, 0.35); }

    #mic.recording {
      color: var(--red);
      border-color: var(--red);
      animation: micPulse 1.1s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.45); }
      50%      { box-shadow: 0 0 0 6px rgba(255, 69, 58, 0); }
    }

    #mic.transcribing, #mic.thinking { color: #378add; border-color: #378add; }
    #mic.thinking { animation: micSpin 1s linear infinite; }
    #mic.acting {
      color: #378add;
      border-color: #378add;
      box-shadow: 0 0 8px 1px rgba(55, 138, 221, 0.6);
    }
    #mic.speaking { color: var(--teal); border-color: var(--teal); }
    @keyframes micSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #spin {
      -webkit-app-region: no-drag;
      display: none;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      background: none;
      padding: 0;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: #378add;
      border-radius: 50%;
      animation: spinTurn 0.8s linear infinite;
    }
    body.loading #spin { display: block; }
    body.loading #mic, body.loading #kill { display: none; }
    body.loading #panel { display: none; }
    body.loading #root { justify-content: flex-start; }
    @keyframes spinTurn { to { transform: rotate(360deg); } }

    #board {
      display: none;
      margin-top: 6px;
      max-height: 360px;
      overflow-y: auto;
      padding: 10px 14px;
      box-sizing: border-box;
    }
    body.loading #board.has { display: block; }
    #board::-webkit-scrollbar { width: 6px; }
    #board::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    #board .bline {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      text-align: center;
      animation: boardIn 0.18s ease-out;
    }
    #board .bline .katex-display { margin: 5px 0; }
    #board .bline.hl {
      color: #FFD60A;
      font-size: 19px;
    }
    #board .bline.plain {
      font-family: var(--mono);
      font-weight: 600;
      text-align: left;
      white-space: pre-wrap;
    }
    @keyframes boardIn {
      from { opacity: 0; transform: translateY(-5px); }
    }

    #content .bmath {
      border-left: 2px solid rgba(255, 214, 10, 0.55);
      background: rgba(255, 214, 10, 0.07);
      padding: 2px 8px;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
    }
    #content .bmath.hl { color: #FFD60A; }
  </style>
</head>
<body>
  <div id="root">
    <div id="panel" class="island">
      <div id="scroll"><div id="content"></div></div>
    </div>
    <div id="bar" class="island">
      <button id="kill" title="Quit">✕</button>
      <input id="prompt" type="text" placeholder="Ask anything — or hold ⌥ Option, circle & speak" autofocus />
      <button id="spin" title="Working — click to cancel"></button>
      <button id="mic" title="Hold ⌥ Option (or click-hold this) to talk. Click while thinking to cancel.">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3" />
          <path d="M5 10v1a7 7 0 0 0 14 0v-1" />
          <line x1="12" y1="18" x2="12" y2="22" />
        </svg>
      </button>
    </div>
    <div id="board" class="island"><div id="board-content"></div></div>
  </div>
  <script src="node_modules/katex/dist/katex.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
